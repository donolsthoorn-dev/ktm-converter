# FTP → input/ → staging-delta in Supabase; apply bouwt staging eerst opnieuw uit CSV.
#
# staging: geen Shopify API; vult public.pricelist_sync_staging (migratie 002_*).
# apply: haalt eerst CSV op en bouwt staging opnieuw op, daarna apply naar Shopify.
#
# Secrets staging: SUPABASE_*, KTM_* (FTP). Secrets apply: + SHOPIFY_*.
#
# Spiegel (shopify_*) moet actueel zijn → draai job-worker vóór staging als je tegen de laatste Shopify-stand vergelijkt.

name: price_eta_status_sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "staging = alleen Supabase-tabel vullen; apply = Shopify bijwerken"
        type: choice
        options:
          - staging
          - apply
        default: staging
  # workflow_run:
  #   workflows: [Job worker]
  #   types: [completed]

jobs:
  sync:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    env:
      RUN_MODE: ${{ github.event.inputs.mode || 'apply' }}
    steps:
      - uses: actions/checkout@v6

      - name: Modus
        run: echo "mode=${{ env.RUN_MODE }}"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch prijsbestanden (FTP/SFTP/FTPS)
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        env:
          KTM_TRANSFER_PROTOCOL: ${{ secrets.KTM_TRANSFER_PROTOCOL }}
          KTM_SFTP_HOST: ${{ secrets.KTM_SFTP_HOST }}
          KTM_SFTP_PORT: ${{ secrets.KTM_SFTP_PORT }}
          KTM_SFTP_USER: ${{ secrets.KTM_SFTP_USER }}
          KTM_SFTP_PASSWORD: ${{ secrets.KTM_SFTP_PASSWORD }}
          KTM_SFTP_REMOTE_DIR: ${{ secrets.KTM_SFTP_REMOTE_DIR }}
          KTM_SFTP_LOCAL_DIR: downloads/ftp
          KTM_SFTP_FILES: 1100_35_Z1_EUR_EN_csv.csv,0910_35_Z1_EUR_EN_csv.csv,0150_35_Z1_EUR_EN_csv.csv,0140_35_Z1_EUR_EN_csv.csv
          KTM_SFTP_PATTERN: ${{ secrets.KTM_SFTP_PATTERN }}
          KTM_FTP_TIMEOUT_SEC: ${{ secrets.KTM_FTP_TIMEOUT_SEC }}
          KTM_FTP_RETRIES: ${{ secrets.KTM_FTP_RETRIES }}
          KTM_FTP_RETRY_SLEEP_SEC: ${{ secrets.KTM_FTP_RETRY_SLEEP_SEC }}
          KTM_FTP_BLOCKSIZE: ${{ secrets.KTM_FTP_BLOCKSIZE }}
        run: python scripts/fetch_input_sftp.py

      - name: Verwijder oude prijs-CSV's uit input (stale guard)
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        run: |
          rm -f input/1100_35_Z1_EUR_EN_csv.csv
          rm -f input/0910_35_Z1_EUR_EN_csv.csv
          rm -f input/0150_35_Z1_EUR_EN_csv.csv
          rm -f input/0140_35_Z1_EUR_EN_csv.csv

      - name: Staging → input/
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        env:
          KTM_SFTP_LOCAL_DIR: downloads/ftp
          KTM_SFTP_FILES: 1100_35_Z1_EUR_EN_csv.csv,0910_35_Z1_EUR_EN_csv.csv,0150_35_Z1_EUR_EN_csv.csv,0140_35_Z1_EUR_EN_csv.csv
          KTM_PREPARE_FILES: 1100_35_Z1_EUR_EN_csv.csv,0910_35_Z1_EUR_EN_csv.csv,0150_35_Z1_EUR_EN_csv.csv,0140_35_Z1_EUR_EN_csv.csv
        run: python scripts/prepare_input_from_ftp.py

      - name: Valideer complete prijs-CSV set (1100/0910/0150/0140)
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        run: |
          missing=0
          for f in \
            1100_35_Z1_EUR_EN_csv.csv \
            0910_35_Z1_EUR_EN_csv.csv \
            0150_35_Z1_EUR_EN_csv.csv \
            0140_35_Z1_EUR_EN_csv.csv; do
            if [ ! -s "input/$f" ]; then
              echo "Ontbreekt of leeg: input/$f"
              missing=1
            else
              ls -l "input/$f"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Onvolledige CSV-set; stop om verkeerde delta te voorkomen."
            exit 1
          fi

      - name: Debug SKU uit ingelezen CSV's
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        env:
          DEBUG_SKU: 3PW250017701
        run: |
          python - <<'PY'
          import csv
          import os
          from pathlib import Path
          from modules.pricing_loader import detect_0150_csv_delimiter

          sku_target = (os.environ.get("DEBUG_SKU") or "").strip().upper()
          if not sku_target:
            print("DEBUG_SKU leeg; skip")
            raise SystemExit(0)

          files = [
            "1100_35_Z1_EUR_EN_csv.csv",
            "0910_35_Z1_EUR_EN_csv.csv",
            "0150_35_Z1_EUR_EN_csv.csv",
            "0140_35_Z1_EUR_EN_csv.csv",
          ]
          input_dir = Path("input")
          all_hits = []
          encodings = ("utf-8", "utf-8-sig", "cp1252", "latin1")

          for name in files:
            p = input_dir / name
            hits = []
            decoded = False
            for enc in encodings:
              try:
                with open(p, newline="", encoding=enc) as fh:
                  first = fh.readline()
                  fh.seek(0)
                  delim = detect_0150_csv_delimiter(first)
                  r = csv.reader(fh, delimiter=delim)
                  h = next(r, None)
                  if not h:
                    print(f"{name}: lege file")
                    decoded = True
                    break
                  try:
                    sku_col = h.index("ArticleNumber")
                    eta_col = h.index("hqETADate")
                    st_col = h.index("ArticleStatus")
                  except ValueError:
                    sku_col, eta_col, st_col = 1, 22, 10
                  for idx, row in enumerate(r, start=2):
                    need = max(sku_col, eta_col, st_col) + 1
                    if len(row) < need:
                      continue
                    sku = (row[sku_col] or "").strip().upper()
                    if sku == sku_target:
                      rec = (name, idx, (row[eta_col] or "").strip(), (row[st_col] or "").strip())
                      hits.append(rec)
                      all_hits.append(rec)
                decoded = True
                break
              except UnicodeDecodeError:
                continue
            if not decoded:
              print(f"FOUT: {name} kon met geen enkele encoding gelezen worden.")
              raise SystemExit(1)
            if hits:
              for rec in hits:
                print(f"{rec[0]} line {rec[1]} -> hqETADate={rec[2]!r}, ArticleStatus={rec[3]!r}")
            else:
              print(f"{name}: geen hit voor {sku_target}")

          if not all_hits:
            print(f"FOUT: SKU {sku_target} komt in geen van de 4 prijs-CSV's voor.")
            raise SystemExit(1)
          print(f"Gekozen waarde (laatste wint): file={all_hits[-1][0]}, eta={all_hits[-1][2]!r}, status={all_hits[-1][3]!r}")
          PY

      - name: CSV vs mirror → Supabase pricelist_sync_staging
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/build_pricelist_supabase_staging.py

      - name: Upload missing SKU rapport
        if: always() && (env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply')
        uses: actions/upload-artifact@v4
        with:
          name: missing-skus-in-shopify-mirror
          path: output/pricelist_missing_in_shopify.csv
          if-no-files-found: ignore

      - name: Apply staging delta → Shopify
        if: env.RUN_MODE == 'apply'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ADMIN_API_VERSION: ${{ secrets.SHOPIFY_ADMIN_API_VERSION }}
          SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE }}
          SHOPIFY_VARIANT_ETA_METAFIELD_KEY: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_KEY }}
        run: python scripts/shopify_apply_from_pricelist_staging.py

      - name: Queue mirror refresh na apply
        if: success() && env.RUN_MODE == 'apply'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/queue_supabase_job.py shopify_catalog_mirror --trigger api

      - name: Process mirror refresh na apply
        if: success() && env.RUN_MODE == 'apply'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ADMIN_API_VERSION: ${{ secrets.SHOPIFY_ADMIN_API_VERSION }}
          SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE }}
          SHOPIFY_VARIANT_ETA_METAFIELD_KEY: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_KEY }}
          SHOPIFY_PRODUCT_FITS_ON_NAMESPACE: ${{ secrets.SHOPIFY_PRODUCT_FITS_ON_NAMESPACE }}
          SHOPIFY_PRODUCT_FITS_ON_KEY: ${{ secrets.SHOPIFY_PRODUCT_FITS_ON_KEY }}
        run: python scripts/supabase_job_worker.py
