# FTP → input/ → daarna óf Supabase staging (review), óf direct Shopify (apply).
#
# staging: geen Shopify API; vult public.pricelist_sync_staging (migratie 002_*).
# apply: variant-cache + shopify_sync_from_pricelist_csv.
#   Let op: dat script vergelijkt nog met JSON-state, niet met goedgekeurde staging-rijen;
#   gebruik apply pas na review wanneer je de CSV-delta vertrouwt. Later: apply uit staging.
#
# Secrets staging: SUPABASE_*, KTM_* (FTP). Secrets apply: + SHOPIFY_*.
#
# Spiegel (shopify_*) moet actueel zijn → draai job-worker vóór staging als je tegen de laatste Shopify-stand vergelijkt.

name: price_eta_status_sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "staging = alleen Supabase-tabel vullen; apply = Shopify bijwerken"
        type: choice
        options:
          - staging
          - apply
        default: staging
  # workflow_run:
  #   workflows: [Job worker]
  #   types: [completed]

jobs:
  sync:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Modus (workflow_dispatch)
        run: echo "mode=${{ github.event.inputs.mode }}"

      - name: Restore prijs/ETA sync cache (alleen bij apply)
        if: github.event.inputs.mode == 'apply'
        uses: actions/cache/restore@v5
        with:
          path: |
            cache/shopify_eta_sync_sku_variant.json
            cache/shopify_pricelist_sync_state.json
          key: ktm-pricelist-sync-never-${{ github.run_id }}
          restore-keys: |
            ktm-pricelist-sync-${{ runner.os }}-
            ktm-0150-sync-${{ runner.os }}-
          fail-on-cache-miss: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Variant-cache bijwerken indien nodig (alleen bij apply)
        if: github.event.inputs.mode == 'apply'
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ADMIN_API_VERSION: ${{ secrets.SHOPIFY_ADMIN_API_VERSION }}
        run: |
          if [ ! -s cache/shopify_eta_sync_sku_variant.json ]; then
            python scripts/shopify_refresh_variant_cache.py
          fi

      - name: Fetch prijsbestanden (FTP/SFTP/FTPS)
        env:
          KTM_TRANSFER_PROTOCOL: ${{ secrets.KTM_TRANSFER_PROTOCOL }}
          KTM_SFTP_HOST: ${{ secrets.KTM_SFTP_HOST }}
          KTM_SFTP_PORT: ${{ secrets.KTM_SFTP_PORT }}
          KTM_SFTP_USER: ${{ secrets.KTM_SFTP_USER }}
          KTM_SFTP_PASSWORD: ${{ secrets.KTM_SFTP_PASSWORD }}
          KTM_SFTP_REMOTE_DIR: ${{ secrets.KTM_SFTP_REMOTE_DIR }}
          KTM_SFTP_LOCAL_DIR: ${{ secrets.KTM_SFTP_LOCAL_DIR }}
          KTM_SFTP_FILES: ${{ secrets.KTM_SFTP_FILES }}
          KTM_SFTP_PATTERN: ${{ secrets.KTM_SFTP_PATTERN }}
          KTM_FTP_TIMEOUT_SEC: ${{ secrets.KTM_FTP_TIMEOUT_SEC }}
          KTM_FTP_RETRIES: ${{ secrets.KTM_FTP_RETRIES }}
          KTM_FTP_RETRY_SLEEP_SEC: ${{ secrets.KTM_FTP_RETRY_SLEEP_SEC }}
          KTM_FTP_BLOCKSIZE: ${{ secrets.KTM_FTP_BLOCKSIZE }}
        run: python scripts/fetch_input_sftp.py

      - name: Staging → input/
        env:
          KTM_SFTP_LOCAL_DIR: ${{ secrets.KTM_SFTP_LOCAL_DIR }}
          KTM_SFTP_FILES: ${{ secrets.KTM_SFTP_FILES }}
          KTM_PREPARE_FILES: ${{ secrets.KTM_PREPARE_FILES }}
        run: python scripts/prepare_input_from_ftp.py

      - name: CSV vs mirror → Supabase pricelist_sync_staging
        if: github.event.inputs.mode == 'staging'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/build_pricelist_supabase_staging.py

      - name: Prijs/ETA/status → Shopify
        if: github.event.inputs.mode == 'apply'
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ADMIN_API_VERSION: ${{ secrets.SHOPIFY_ADMIN_API_VERSION }}
          SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE }}
          SHOPIFY_VARIANT_ETA_METAFIELD_KEY: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_KEY }}
        run: python scripts/shopify_sync_from_pricelist_csv.py

      - name: Zorg dat delta-state bestand bestaat (cache-upload, apply)
        if: always() && github.event.inputs.mode == 'apply'
        run: |
          mkdir -p cache
          if [ ! -f cache/shopify_pricelist_sync_state.json ]; then
            echo '{}' > cache/shopify_pricelist_sync_state.json
          fi

      - name: Save prijs/ETA sync cache
        if: always() && github.event.inputs.mode == 'apply'
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: |
            cache/shopify_eta_sync_sku_variant.json
            cache/shopify_pricelist_sync_state.json
          key: ktm-pricelist-sync-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
