# FTP → input/ → staging-delta in Supabase; apply bouwt staging eerst opnieuw uit CSV.
#
# staging: geen Shopify API; vult public.pricelist_sync_staging (migratie 002_*).
# apply: haalt eerst CSV op en bouwt staging opnieuw op, daarna apply naar Shopify.
#        apply_scope bepaalt of alleen price+eta, alleen policy(+productstatus), of alles draait.
#
# Secrets staging: SUPABASE_*, KTM_* (FTP). Secrets apply: + SHOPIFY_*.
#
# Spiegel (shopify_*) moet actueel zijn → draai job-worker vóór staging als je tegen de laatste Shopify-stand vergelijkt.

name: price_eta_status_sync
run-name: price_eta_status_sync (mode=${{ github.event.inputs.mode || 'apply' }}, scope=${{ github.event.inputs.apply_scope || 'price_eta' }})
concurrency:
  group: price-eta-status-sync-${{ github.event.inputs.mode || 'apply' }}-${{ github.event.inputs.apply_scope || 'price_eta' }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "staging = alleen Supabase-tabel vullen; apply = Shopify bijwerken"
        type: choice
        options:
          - staging
          - apply
        default: staging
      apply_scope:
        description: "Bij mode=apply: price_eta, policy of all"
        type: choice
        options:
          - price_eta
          - policy
          - all
        default: price_eta
  # workflow_run:
  #   workflows: [Job worker]
  #   types: [completed]

jobs:
  sync:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: shopify-write-lock
      cancel-in-progress: false
    env:
      RUN_MODE: ${{ github.event.inputs.mode || 'apply' }}
      APPLY_SCOPE: ${{ github.event.inputs.apply_scope || 'price_eta' }}
      WORKFLOW_FILE_NAME: price_eta_status_sync.yml
      SKIP_STAGING_REBUILD: "0"
      SKIP_REASON: ""
      SKIP_REASON_DETAIL: ""
      SHOPIFY_REST_PREEMPTIVE_SLEEP_SEC: "0.05"
    steps:
      - uses: actions/checkout@v6

      - name: Modus
        run: echo "mode=${{ env.RUN_MODE }}"

      - name: Skip price_eta wanneer policy-run actief is
        if: env.RUN_MODE == 'apply' && env.APPLY_SCOPE == 'price_eta'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          WORKFLOW_FILE: price_eta_status_sync.yml
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = (os.environ.get("GITHUB_TOKEN") or "").strip()
          repo = (os.environ.get("REPO") or "").strip()
          wf = (os.environ.get("WORKFLOW_FILE") or "").strip()
          current_run_id = int((os.environ.get("CURRENT_RUN_ID") or "0").strip() or "0")
          if not token or not repo or not wf or not current_run_id:
              print("Guard-check mist context; ga door zonder skip.")
              raise SystemExit(0)

          url = f"https://api.github.com/repos/{repo}/actions/workflows/{wf}/runs?status=in_progress&event=workflow_dispatch&per_page=100"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              body = json.loads(resp.read().decode("utf-8", "replace"))

          blocking = []
          for run in body.get("workflow_runs") or []:
              rid = int(run.get("id") or 0)
              if rid == current_run_id:
                  continue
              title = str(run.get("display_title") or "").lower()
              if "scope=policy" in title:
                  blocking.append((rid, title))

          if blocking:
              print("Policy-run actief; deze price_eta-run wordt overgeslagen.")
              print("Blokkerende run(s):")
              for rid, title in blocking[:10]:
                  print(f"- {rid}: {title}")
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
                  f.write("RUN_MODE=skip\n")
          else:
              print("Geen actieve policy-run gevonden; price_eta mag door.")
          PY

      - name: Skip apply wanneer customs-run actief is
        if: env.RUN_MODE == 'apply'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          token = (os.environ.get("GITHUB_TOKEN") or "").strip()
          repo = (os.environ.get("REPO") or "").strip()
          current_run_id = int((os.environ.get("CURRENT_RUN_ID") or "0").strip() or "0")
          if not token or not repo or not current_run_id:
              print("Customs-guard mist context; ga door zonder skip.")
              raise SystemExit(0)

          url = f"https://api.github.com/repos/{repo}/actions/workflows/customs_missing_fill.yml/runs?status=in_progress&event=workflow_dispatch&per_page=100"
          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req, timeout=20) as resp:
              body = json.loads(resp.read().decode("utf-8", "replace"))

          blocking = []
          for run in body.get("workflow_runs") or []:
              rid = int(run.get("id") or 0)
              if rid == current_run_id:
                  continue
              title = str(run.get("display_title") or "").strip()
              blocking.append((rid, title))

          if blocking:
              print("Customs-run actief; deze apply-run wordt overgeslagen.")
              print("Blokkerende customs-run(s):")
              for rid, title in blocking[:10]:
                  print(f"- {rid}: {title}")
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
                  f.write("RUN_MODE=skip\n")
                  f.write("SKIP_REASON=customs_run_in_progress\n")
                  f.write(f"SKIP_REASON_DETAIL=customs_missing_fill active runs: {len(blocking)}\n")
          else:
              print("Geen actieve customs-run gevonden; apply mag door.")
          PY

      - uses: actions/setup-python@v6
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        with:
          python-version: "3.12"

      - name: Log skip naar workflow_dispatch_log
        if: env.RUN_MODE == 'skip'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WORKFLOW_FILE: price_eta_status_sync.yml
          GITHUB_RUN_ID: ${{ github.run_id }}
          APPLY_SCOPE: ${{ env.APPLY_SCOPE }}
          SKIP_REASON: ${{ env.SKIP_REASON }}
          SKIP_REASON_DETAIL: ${{ env.SKIP_REASON_DETAIL }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          base = (os.environ.get("SUPABASE_URL") or "").strip().rstrip("/")
          key = (os.environ.get("SUPABASE_SERVICE_ROLE_KEY") or "").strip()
          wf = (os.environ.get("WORKFLOW_FILE") or "").strip()
          run_id_raw = (os.environ.get("GITHUB_RUN_ID") or "").strip()
          scope = (os.environ.get("APPLY_SCOPE") or "").strip()
          skip_reason = (os.environ.get("SKIP_REASON") or "").strip() or "skip_guard"
          skip_detail = (os.environ.get("SKIP_REASON_DETAIL") or "").strip()
          if not base or not key or not wf or not run_id_raw.isdigit():
              print("Skip-log: context ontbreekt, sla Supabase-log update over.")
              raise SystemExit(0)

          run_id = int(run_id_raw)
          now = datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")
          hdr = {
              "apikey": key,
              "Authorization": f"Bearer {key}",
              "Content-Type": "application/json",
              "Accept": "application/json",
          }

          # Pak de meest recente dispatch-logrij voor dit workflow_file.
          q = urllib.parse.urlencode(
              {
                  "select": "id",
                  "workflow_file": f"eq.{wf}",
                  "order": "created_at.desc",
                  "limit": "1",
              }
          )
          req = urllib.request.Request(f"{base}/rest/v1/workflow_dispatch_log?{q}", headers=hdr)
          with urllib.request.urlopen(req, timeout=20) as resp:
              rows = json.loads(resp.read().decode("utf-8", "replace")) or []
          if not rows:
              print("Skip-log: geen workflow_dispatch_log rij gevonden.")
              raise SystemExit(0)
          row_id = rows[0].get("id")
          if row_id is None:
              print("Skip-log: gevonden rij heeft geen id.")
              raise SystemExit(0)

          patch_body = {
              "run_state": "skipped",
              "run_started_at": now,
              "run_finished_at": now,
              "github_run_id": run_id,
              "run_summary": f"scope={scope}; skipped ({skip_reason})",
              "run_stats": {
                  "scope": scope,
                  "skipped": True,
                  "reason": skip_reason,
                  "detail": skip_detail,
              },
          }
          patch_url = f"{base}/rest/v1/workflow_dispatch_log?id=eq.{row_id}"
          patch_req = urllib.request.Request(
              patch_url,
              data=json.dumps(patch_body).encode("utf-8"),
              headers=hdr,
              method="PATCH",
          )
          with urllib.request.urlopen(patch_req, timeout=20) as _:
              pass
          print(f"Skip-log bijgewerkt voor workflow_dispatch_log.id={row_id}.")
          PY

      - name: Policy resume-check op open staging-rows
        if: env.RUN_MODE == 'apply' && env.APPLY_SCOPE == 'policy'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          base = (os.environ.get("SUPABASE_URL") or "").strip().rstrip("/")
          key = (os.environ.get("SUPABASE_SERVICE_ROLE_KEY") or "").strip()
          if not base or not key:
            print("Resume-check: Supabase secrets ontbreken; staging wordt opnieuw opgebouwd.")
            raise SystemExit(0)

          hdr = {
              "apikey": key,
              "Authorization": f"Bearer {key}",
              "Accept": "application/json",
          }
          q = urllib.parse.urlencode(
              {
                  "select": "id",
                  "inventory_policy_changed": "eq.true",
                  "policy_updated_at": "is.null",
                  "limit": "1",
              }
          )
          req = urllib.request.Request(f"{base}/rest/v1/pricelist_sync_staging?{q}", headers=hdr)
          try:
              with urllib.request.urlopen(req, timeout=20) as resp:
                  rows = json.loads(resp.read().decode("utf-8", "replace")) or []
          except Exception as e:
              print(f"Resume-check mislukt ({e}); staging wordt opnieuw opgebouwd.")
              raise SystemExit(0)

          if rows:
              print("Policy resume: open staging-rows gevonden; staging rebuild wordt overgeslagen.")
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
                  f.write("SKIP_STAGING_REBUILD=1\n")
          else:
              print("Policy resume: geen open staging-rows; staging wordt opnieuw opgebouwd.")
          PY

      - name: Install Python dependencies
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        run: pip install -r requirements.txt

      - name: Fetch prijsbestanden (FTP/SFTP/FTPS)
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        env:
          KTM_TRANSFER_PROTOCOL: ${{ secrets.KTM_TRANSFER_PROTOCOL }}
          KTM_SFTP_HOST: ${{ secrets.KTM_SFTP_HOST }}
          KTM_SFTP_PORT: ${{ secrets.KTM_SFTP_PORT }}
          KTM_SFTP_USER: ${{ secrets.KTM_SFTP_USER }}
          KTM_SFTP_PASSWORD: ${{ secrets.KTM_SFTP_PASSWORD }}
          KTM_SFTP_REMOTE_DIR: ${{ secrets.KTM_SFTP_REMOTE_DIR }}
          KTM_SFTP_LOCAL_DIR: downloads/ftp
          KTM_SFTP_FILES: 1100_35_Z1_EUR_EN_csv.csv,0910_35_Z1_EUR_EN_csv.csv,0150_35_Z1_EUR_EN_csv.csv,0140_35_Z1_EUR_EN_csv.csv
          KTM_SFTP_PATTERN: ${{ secrets.KTM_SFTP_PATTERN }}
          KTM_FTP_TIMEOUT_SEC: ${{ secrets.KTM_FTP_TIMEOUT_SEC }}
          KTM_FTP_RETRIES: ${{ secrets.KTM_FTP_RETRIES }}
          KTM_FTP_RETRY_SLEEP_SEC: ${{ secrets.KTM_FTP_RETRY_SLEEP_SEC }}
          KTM_FTP_BLOCKSIZE: ${{ secrets.KTM_FTP_BLOCKSIZE }}
        run: python scripts/fetch_input_sftp.py

      - name: Verwijder oude prijs-CSV's uit input (stale guard)
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        run: |
          rm -f input/1100_35_Z1_EUR_EN_csv.csv
          rm -f input/0910_35_Z1_EUR_EN_csv.csv
          rm -f input/0150_35_Z1_EUR_EN_csv.csv
          rm -f input/0140_35_Z1_EUR_EN_csv.csv

      - name: Staging → input/
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        env:
          KTM_SFTP_LOCAL_DIR: downloads/ftp
          KTM_SFTP_FILES: 1100_35_Z1_EUR_EN_csv.csv,0910_35_Z1_EUR_EN_csv.csv,0150_35_Z1_EUR_EN_csv.csv,0140_35_Z1_EUR_EN_csv.csv
          KTM_PREPARE_FILES: 1100_35_Z1_EUR_EN_csv.csv,0910_35_Z1_EUR_EN_csv.csv,0150_35_Z1_EUR_EN_csv.csv,0140_35_Z1_EUR_EN_csv.csv
        run: python scripts/prepare_input_from_ftp.py

      - name: Valideer complete prijs-CSV set (1100/0910/0150/0140)
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        run: |
          missing=0
          for f in \
            1100_35_Z1_EUR_EN_csv.csv \
            0910_35_Z1_EUR_EN_csv.csv \
            0150_35_Z1_EUR_EN_csv.csv \
            0140_35_Z1_EUR_EN_csv.csv; do
            if [ ! -s "input/$f" ]; then
              echo "Ontbreekt of leeg: input/$f"
              missing=1
            else
              ls -l "input/$f"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Onvolledige CSV-set; stop om verkeerde delta te voorkomen."
            exit 1
          fi

      - name: CSV vs mirror → Supabase pricelist_sync_staging
        if: env.RUN_MODE == 'staging' || env.RUN_MODE == 'apply'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ "${{ env.RUN_MODE }}" = "apply" ] && [ "${{ env.APPLY_SCOPE }}" = "policy" ] && [ "${{ env.SKIP_STAGING_REBUILD }}" = "1" ]; then
            echo "Policy resume actief: staging rebuild overgeslagen."
          elif [ "${{ env.RUN_MODE }}" = "apply" ] && { [ "${{ env.APPLY_SCOPE }}" = "policy" ] || [ "${{ env.APPLY_SCOPE }}" = "all" ]; }; then
            python scripts/build_pricelist_supabase_staging.py
          else
            python scripts/build_pricelist_supabase_staging.py --missing-skus-csv ""
          fi

      - name: Upload missing SKU rapport
        if: always() && env.RUN_MODE == 'apply' && (env.APPLY_SCOPE == 'policy' || env.APPLY_SCOPE == 'all')
        uses: actions/upload-artifact@v6
        with:
          name: missing-skus-in-shopify-mirror
          path: output/pricelist_missing_in_shopify.csv
          if-no-files-found: ignore

      - name: Apply staging delta → Shopify
        if: env.RUN_MODE == 'apply'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ADMIN_API_VERSION: ${{ secrets.SHOPIFY_ADMIN_API_VERSION }}
          SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE }}
          SHOPIFY_VARIANT_ETA_METAFIELD_KEY: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_KEY }}
        run: python scripts/shopify_apply_from_pricelist_staging.py --scope "${{ env.APPLY_SCOPE }}"

