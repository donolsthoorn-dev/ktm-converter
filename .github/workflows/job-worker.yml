# Verwerkt maximaal één `queued` job (scripts/supabase_job_worker.py).
# Secrets: repo → Settings → Secrets and variables → Actions → SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

name: Job worker

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install "requests>=2.28,<3"

      - name: Process one queued job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/supabase_job_worker.py
