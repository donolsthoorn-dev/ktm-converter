# Elke run: mirror-job in de wachtrij + één job verwerken (Shopify → Supabase).
#
# Trigger via Supabase pg_cron (workflow_dispatch).
#
# Prijs/ETA-sync vanuit FTP zit in een aparte workflow: price_eta_status_sync.yml
# (testen met workflow_dispatch; later eventueel na deze run via workflow_run of een offset-cron).
#
# Verwerkt maximaal één `queued` job per run (scripts/supabase_job_worker.py).
#
# Actions-secrets:
#   SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
#   SHOPIFY_ACCESS_TOKEN, SHOPIFY_SHOP_DOMAIN
#   Optioneel: SHOPIFY_ADMIN_API_VERSION, SHOPIFY_VARIANT_ETA_*, SHOPIFY_PRODUCT_FITS_ON_*

name: Job worker

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install "requests>=2.28,<3"

      - name: Queue shopify_catalog_mirror
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/queue_supabase_job.py shopify_catalog_mirror --trigger schedule

      - name: Process one queued job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ADMIN_API_VERSION: ${{ secrets.SHOPIFY_ADMIN_API_VERSION }}
          SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE }}
          SHOPIFY_VARIANT_ETA_METAFIELD_KEY: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_KEY }}
          SHOPIFY_PRODUCT_FITS_ON_NAMESPACE: ${{ secrets.SHOPIFY_PRODUCT_FITS_ON_NAMESPACE }}
          SHOPIFY_PRODUCT_FITS_ON_KEY: ${{ secrets.SHOPIFY_PRODUCT_FITS_ON_KEY }}
        run: python scripts/supabase_job_worker.py
