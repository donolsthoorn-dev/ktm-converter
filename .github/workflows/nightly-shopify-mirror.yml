# Elke nacht: mirror-job in de wachtrij zetten + worker draaien (één run).
#
# GitHub-cron is ALLEEN UTC — geen “Amsterdam-tijd” knop.
# - Zomertijd (CEST, ~eind mrt t/m eind okt): 01:00 NL = 23:00 UTC op de *vorige* kalenderdag.
#   Daarom: cron 10 23 * * * (~01:10 's nachts in Amsterdam tijdens CEST).
# - Wintertijd (CET): 01:10 NL = 00:10 UTC → gebruik dan "10 0 * * *" (twee keer per jaar omschakelen
#   of accepteer in de zomer geen run precies op winter-CET-01:00 met één vaste regel).
#
# GitHub kan geplande runs enkele minuten uitstellen; check Actions rond 01:15 NL-tijd.
#
# Zelfde secrets als job-worker.yml + queue-script.

name: Nightly Shopify mirror

on:
  schedule:
    - cron: "10 23 * * *"
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install "requests>=2.28,<3"

      - name: Queue shopify_catalog_mirror
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/queue_supabase_job.py shopify_catalog_mirror --trigger schedule

      - name: Run worker (pakt de zojuist gequeue-de job)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_SHOP_DOMAIN: ${{ secrets.SHOPIFY_SHOP_DOMAIN }}
          SHOPIFY_ADMIN_API_VERSION: ${{ secrets.SHOPIFY_ADMIN_API_VERSION }}
          SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_NAMESPACE }}
          SHOPIFY_VARIANT_ETA_METAFIELD_KEY: ${{ secrets.SHOPIFY_VARIANT_ETA_METAFIELD_KEY }}
          SHOPIFY_PRODUCT_FITS_ON_NAMESPACE: ${{ secrets.SHOPIFY_PRODUCT_FITS_ON_NAMESPACE }}
          SHOPIFY_PRODUCT_FITS_ON_KEY: ${{ secrets.SHOPIFY_PRODUCT_FITS_ON_KEY }}
        run: python scripts/supabase_job_worker.py

      # Volgende stap (nog te bouwen): prijsbron (bv. 0150) vs shopify_variants in Supabase
      # vergelijken en alleen afwijkende varianten via Admin API bijwerken — apart script + job_type.
