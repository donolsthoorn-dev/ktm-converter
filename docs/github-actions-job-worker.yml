# Kopieer dit bestand naar: .github/workflows/job-worker.yml
# (GitHub voert alleen workflows uit die in die map staan.)
#
# Waarom hier en niet direct in .github?
# Bij push via HTTPS + Personal Access Token zonder "workflow"-scope weigert GitHub
# wijzigingen onder .github/workflows/. Met SSH of een PAT mét workflow-scope mag het wél.
#
# Vereiste repository secrets (GitHub → Settings → Secrets → Actions):
#   SUPABASE_URL
#   SUPABASE_SERVICE_ROLE_KEY

name: Job worker

on:
  workflow_dispatch:
  schedule:
    # Elke 6 uur (UTC); pas aan of zet uit door schedule te verwijderen
    - cron: "17 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install "requests>=2.28,<3"

      - name: Process one queued job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/supabase_job_worker.py
